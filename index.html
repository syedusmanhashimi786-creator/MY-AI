<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY-AI Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{display:flex;height:100vh;background:#ffffff;color:#000;}
.sidebar{width:220px;background:#f0f0f0;border-right:1px solid #ddd;display:flex;flex-direction:column;padding:20px;}
.sidebar img{width:100%;margin-bottom:30px;}
.sidebar button{padding:12px 15px;margin-bottom:10px;border:none;border-radius:8px;background:#e0e0e0;cursor:pointer;font-weight:bold;text-align:left;}
.sidebar button:hover{background:#d0d0d0;}
.main{flex:1;display:flex;flex-direction:column;padding:20px;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:28px;margin-bottom:5px;}
.header p{font-size:16px;color:#555;}
.chat-container{flex:1;display:flex;flex-direction:column;border:1px solid #ddd;border-radius:10px;padding:15px;overflow-y:auto;background:#fafafa;}
.message{padding:10px 15px;border-radius:10px;margin-bottom:10px;max-width:70%;word-wrap:break-word;opacity:0;animation:fadeIn 0.3s forwards;}
.user{background:#00bfff;color:#fff;margin-left:auto;text-align:right;}
.ai{background:#e0e0e0;color:#000;margin-right:auto;text-align:left;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.input-area{display:flex;margin-top:15px;}
input{flex:1;padding:12px;border-radius:8px;border:1px solid #ccc;font-size:16px;outline:none;}
button.ask{padding:12px 20px;margin-left:10px;border:none;border-radius:8px;background:#00bfff;color:#fff;font-weight:bold;cursor:pointer;}
button.ask:hover{background:#0099cc;}
.footer{text-align:center;margin-top:15px;font-size:13px;opacity:0.7;}
.typing{font-style:italic;color:#aaa;}
</style>
</head>
<body>

<div class="sidebar">
    <!-- Logo -->
    <img src="your-logo.png" alt="Logo"> <!-- replace with your logo -->

    <button id="newChat">New Chat</button>
    <button id="searchChats">Search Chats</button>
    <button id="deepSearch">Deep Search</button>
    <button id="codex">Codex</button>
    <button id="projects">Projects</button>
</div>

<div class="main">
    <div class="header">
        <h1>Welcome </h1>
        <p>How are you?</p>
    </div>

    <div id="chat" class="chat-container">
        <!-- Chat messages appear here -->
    </div>

    <div class="input-area">
        <input id="question" placeholder="Ask your question...">
        <button class="ask" onclick="askAI()">Ask AI</button>
    </div>

    <div class="footer">
        Created by Syed Usman Hashimi
    </div>
</div>

<script>
let chatHistory = [];

const chatContainer = document.getElementById("chat");
const input = document.getElementById("question");

// Load chat history from localStorage if exists
let savedHistory = JSON.parse(localStorage.getItem("chatHistory")) || [];
savedHistory.forEach(msg => addMessage(msg.content, msg.role));
chatHistory = savedHistory;

// Input enter key
input.addEventListener("keypress", function(e){
    if(e.key === "Enter") askAI();
});

// Add message function
function addMessage(text,type){
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.innerText = text;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    setTimeout(()=>{div.style.opacity=1;},50);
    return div;
}

// Typing animation
function typeEffect(text, element){
    element.innerText="";
    let i=0;
    let interval = setInterval(()=>{
        element.innerText+=text.charAt(i);
        i++;
        if(i>=text.length) clearInterval(interval);
        element.scrollIntoView({behavior:"smooth"});
    },20);
}

// Ask AI
async function askAI(){
    const q = input.value;
    if(!q) return;
    addMessage(q,"user");
    chatHistory.push({role:"user", content:q});
    input.value="";

    const typingDiv = addMessage("AI is thinking...","ai");
    typingDiv.classList.add("typing");

    try{
        const response = await fetch("https://api.openai.com/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer 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"
            },
            body: JSON.stringify({
                model:"gpt-3.5-turbo",
                messages:[
                    {role:"system", content:"You are a helpful AI assistant. Reply clearly and politely."},
                    {role:"user", content:q}
                ]
            })
        });
        const data = await response.json();
        const reply = data.choices[0].message.content;
        typingDiv.classList.remove("typing");
        typeEffect(reply, typingDiv);
        chatHistory.push({role:"ai", content:reply});
        localStorage.setItem("chatHistory", JSON.stringify(chatHistory));
    }catch(err){
        typingDiv.classList.remove("typing");
        
}

// Sidebar buttons
document.getElementById("newChat").addEventListener("click", ()=>{
    chatContainer.innerHTML="";
    chatHistory=[];
    localStorage.removeItem("chatHistory");
});

document.getElementById("searchChats").addEventListener("click", ()=> alert("Search Chats clicked"));
document.getElementById("deepSearch").addEventListener("click", ()=> alert("Deep Search clicked"));
document.getElementById("codex").addEventListener("click", ()=> alert("Codex clicked"));
document.getElementById("projects").addEventListener("click", ()=> alert("Projects clicked"));
</script>

</body>
</html>
