<!DOCTYPE html>
<html>
<head>
<title>MY-AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:700px;
    background:rgba(0,0,0,0.4);
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 25px cyan;
    display:flex;
    flex-direction:column;
}
h1{
    text-align:center;
    color:#00ffff;
    margin-bottom:10px;
}
.chat{
    height:300px;
    overflow-y:auto;
    background:rgba(0,0,0,0.3);
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}
.message{
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
}
.user{
    background:#00ffff;
    color:black;
    text-align:right;
}
.ai{
    background:#ffffff;
    color:black;
}
.input-area{
    display:flex;
}
input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    font-size:16px;
}
button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-left:10px;
}
button:hover{
    background:white;
}
.footer{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    opacity:0.7;
}
</style>
</head>
<body>

<div class="container">
<h1>MY-AI Assistant</h1>

<div id="chat" class="chat"></div>

<div class="input-area">
    <input id="question" placeholder="Ask your question...">
    <button onclick="askAI()">Ask AI</button>
</div>

<div class="footer">
Created by Syed Usman Hashimi
</div>
</div>

<script>
const input = document.getElementById("question")

input.addEventListener("keypress",function(e){
    if(e.key === "Enter"){
        askAI()
    }
})

function addMessage(text,type){
    let chat = document.getElementById("chat")
    let div = document.createElement("div")
    div.className = "message " + type
    div.innerText = text
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
}

async function askAI(){
    let q = input.value
    if(!q) return
    addMessage(q,"user")
    input.value=""
    addMessage("AI is thinking...","ai")

    try{
        const response = await fetch("https://api.openai.com/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer YOUR_API_KEY"
            },
            body:JSON.stringify({
                model:"gpt-4o-mini",
                messages:[
                    {role:"system", content:"You are a smart AI assistant. Answer clearly, accurately and politely."},
                    {role:"user", content:q}
                ]
            })
        })

        const data = await response.json()
        const reply = data.choices[0].message.content

        let chat = document.getElementById("chat")
        chat.lastChild.innerText = reply

    }catch(err){
        chat.lastChild.innerText = "Error: Could not get AI response."
        console.error(err)
    }
}
</script>

</body>
</html>
