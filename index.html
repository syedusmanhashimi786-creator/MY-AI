<!DOCTYPE html>
<html>
<head>
<title>MY-AI Assistant</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:15px;
box-shadow:0 0 25px cyan;
}

h1{
font-size:40px;
color:#00ffff;
text-shadow:0 0 10px cyan;
}

p{
font-size:18px;
opacity:0.9;
}

input{
width:70%;
padding:12px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#00ffff;
color:black;
font-weight:bold;
cursor:pointer;
margin-left:10px;
box-shadow:0 0 15px cyan;
}

button:hover{
background:white;
}

.footer{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<h1>MY-AI Assistant</h1>

<p>
Your futuristic AI assistant that helps answer questions,
assist in studying, and generate creative ideas instantly.
</p>

<input id="question" type="text" placeholder="Ask your question...">
<button onclick="askAI()">Ask AI</button>

<div class="footer">
Created by Syed Usman Hashimi
</div>

</div>
<script>

async function askAI(){

let q = document.getElementById("question").value

if(!q) return

alert("You asked: " + q)

}

</script>
</body>
</html>
