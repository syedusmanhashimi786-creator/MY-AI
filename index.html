<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGen AI</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e0f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .chat-container {
    background: #ffffff;
    width: 400px;
    max-width: 95%;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    border-radius: 15px;
    padding: 15px;
    background: #f1faff;
    margin-bottom: 15px;
  }

  .message {
    margin-bottom: 12px;
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 80%;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
  }

  .user {
    background: #0288d1;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 0;
  }

  .ai {
    background: #d32f2f;
    color: white;
    align-self: flex-start;
    border-bottom-left-radius: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .input-area {
    display: flex;
    gap: 10px;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 15px;
    border: 1px solid #b2ebf2;
  }

  button {
    padding: 10px 15px;
    border-radius: 15px;
    border: none;
    background: #0288d1;
    color: white;
    cursor: pointer;
  }

  #ai-logo {
    display: block;
    width: 60px;
    height: 60px;
    margin: 0 auto 10px auto;
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #00796b;
  }
</style>
</head>
<body>

<div class="chat-container">
  <img src="brain-lightning.png" id="ai-logo" alt="StudyGen AI Logo">
  <h2 id="ai-name">StudyGen AI</h2>
  <div id="messages"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ask a question..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const apiKey = "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";

async function sendMessage() {
  const userInput = document.getElementById("user-input").value.trim();
  if(!userInput) return;

  const messagesDiv = document.getElementById("messages");
  // Add user message
  messagesDiv.innerHTML += `<div class="message user">You: ${userInput}</div>`;
  document.getElementById("user-input").value = "";
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  // Add typing indicator
  const typingDiv = document.createElement("div");
  typingDiv.className = "message ai";
  typingDiv.textContent = "StudyGen AI is typing...";
  messagesDiv.appendChild(typingDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "gpt-3.5-turbo",
        messages: [
          {role: "system", content: "You are StudyGen AI, a friendly AI that helps students learn and solve problems efficiently."},
          {role: "user", content: userInput}
        ],
        temperature: 0.7
      })
    });

    const data = await response.json();
    const aiReply = data.choices[0].message.content;

    typingDiv.textContent = `StudyGen AI: ${aiReply}`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  } catch (error) {
    typingDiv.textContent = "Error: Could not reach StudyGen AI.";
    console.error(error);
  }
}
</script>

</body>
</html>
